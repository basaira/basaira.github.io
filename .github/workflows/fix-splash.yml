name: Finalize public page file separation

on:
  push:
    paths:
      - ".github/workflows/fix-splash.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Separate inline CSS and patch splash timing
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          h = Path('index.html').read_text(encoding='utf-8')
          m = re.search(r'<style>\s*(.*?)\s*</style>', h, re.S)
          if m:
              Path('styles.css').write_text(m.group(1).strip() + '\n', encoding='utf-8')
              h = h[:m.start()] + '<link rel="stylesheet" href="styles.css?v=20260703-clean-architecture-4">' + h[m.end():]
          h = re.sub(r'basair-content-map\.js\?v=[^"\']+', 'basair-content-map.js?v=20260703-clean-map-4', h)
          h = re.sub(r'app\.js\?v=[^"\']+', 'app.js?v=20260703-clean-app-4', h)
          Path('index.html').write_text(h, encoding='utf-8')
          p = Path('app.js')
          s = p.read_text(encoding='utf-8')
          s = s.replace('hideSplash(5200);', 'hideSplash(2600);')
          s = s.replace('hideSplash(1200);', 'hideSplash(2600);')
          s = s.replace('}, 12000);', '}, 9000);')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css app.js
          git commit -m "Separate public page CSS and finalize splash timing" || exit 0
          git push
