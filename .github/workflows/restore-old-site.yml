name: Restore old public site

on:
  push:
    paths:
      - ".github/workflows/restore-old-site.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore exact previous site tree
        run: |
          set -euo pipefail
          OLD="f9a4a095b77b7b7773d362fb39773cf1651b1e21"
          git checkout "$OLD" -- .
          git diff --name-only --diff-filter=A "$OLD"..HEAD -z | xargs -0 -r git rm -f --ignore-unmatch
          git status --short

      - name: Commit restored site
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore public site to previous version" || exit 0
          git push
